<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFT Подарки</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .app {
            max-width: 430px;
            width: 100%;
            min-height: 100vh;
            background: #0a0a0f;
            padding-bottom: 20px;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 16px 12px 16px;
            background: #0a0a0f;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .header h1 {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #8e8ea0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .stats {
            font-size: 13px;
            color: #6e6e80;
        }

        .header .stats span {
            color: #ffffff;
            font-weight: 700;
        }

        /* FILTERS */
        .filters {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 12px 16px;
            scrollbar-width: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .filters::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 6px 16px;
            border-radius: 20px;
            color: #8e8ea0;
            font-size: 12px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }

        /* NFT GRID - 2 columns */
        .nft-grid {
            padding: 12px 12px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        /* NFT CARD */
        .nft-card {
            background: linear-gradient(145deg, #14141e 0%, #1a1a2e 100%);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            position: relative;
        }

        .nft-card:active {
            transform: scale(0.97);
        }

        /* Expanded card */
        .nft-card.expanded {
            grid-column: 1 / -1;
            transform: scale(1);
            z-index: 50;
        }

        .nft-card.expanded .nft-card-inner {
            flex-direction: row;
            padding: 16px;
            gap: 16px;
        }

        .nft-card.expanded .lottie-wrapper {
            width: 120px;
            height: 120px;
        }

        .nft-card.expanded .nft-info-compact {
            display: none;
        }

        .nft-card.expanded .nft-info-expanded {
            display: block;
        }

        .nft-card:not(.expanded) .nft-info-expanded {
            display: none;
        }

        .nft-card:not(.expanded) .nft-info-compact {
            display: block;
        }

        .nft-card-inner {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 8px;
        }

        .nft-card.expanded .nft-card-inner {
            flex-direction: row;
        }

        /* LOTTIE */
        .lottie-wrapper {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .nft-card.expanded .lottie-wrapper {
            width: 120px;
            height: 120px;
            flex-shrink: 0;
        }

        .lottie-wrapper .lottie-container {
            width: 100%;
            height: 100%;
        }

        /* Status badge */
        .status-badge {
            position: absolute;
            top: 4px;
            right: 4px;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 7px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .status-badge.sold {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.2);
        }

        .status-badge['for-sale'] {
            background: rgba(75, 200, 138, 0.15);
            color: #4bc88a;
            border: 1px solid rgba(75, 200, 138, 0.15);
        }

        .status-badge['on-auction'] {
            background: rgba(255, 200, 50, 0.15);
            color: #ffc832;
            border: 1px solid rgba(255, 200, 50, 0.15);
        }

        /* NFT INFO COMPACT */
        .nft-info-compact {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .nft-name-compact {
            font-size: 12px;
            font-weight: 700;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nft-model-compact {
            font-size: 10px;
            color: #8e8ea0;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* NFT INFO EXPANDED */
        .nft-info-expanded {
            flex: 1;
            min-width: 0;
        }

        .nft-name-expanded {
            font-size: 18px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 2px;
        }

        .nft-number-expanded {
            font-size: 14px;
            font-weight: 700;
            color: #4a8af4;
            margin-bottom: 6px;
        }

        .nft-description {
            font-size: 13px;
            color: #8e8ea0;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .nft-details {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 12px;
            margin-bottom: 8px;
        }

        .nft-detail-item {
            font-size: 12px;
            color: #6e6e80;
        }

        .nft-detail-item .label {
            color: #8e8ea0;
        }

        .nft-detail-item .value {
            color: #ffffff;
            font-weight: 600;
        }

        /* PRICE */
        .nft-price {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .nft-price .gram-icon {
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #4a8af4, #6c5ce7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 800;
            color: #ffffff;
            flex-shrink: 0;
        }

        .nft-price .usd {
            font-size: 11px;
            font-weight: 400;
            color: #6e6e80;
        }

        /* BUY BUTTON */
        .btn-buy {
            background: linear-gradient(135deg, #4a8af4, #6c5ce7);
            border: none;
            padding: 6px 16px;
            border-radius: 12px;
            color: #ffffff;
            font-size: 13px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .btn-buy:active {
            transform: scale(0.95);
        }

        .btn-buy:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .btn-buy.sold-out {
            background: rgba(255, 255, 255, 0.05);
            color: #6e6e80;
        }

        /* LOADING */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #6e6e80;
            font-size: 14px;
            grid-column: 1 / -1;
        }

        .loading .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid rgba(255, 255, 255, 0.04);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* CART FLOATING */
        .cart-floating {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(145deg, #1a1a2e, #14141e);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 10px 20px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            z-index: 200;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cart-floating:active {
            transform: translateX(-50%) scale(0.95);
        }

        .cart-floating .cart-icon {
            font-size: 18px;
            position: relative;
        }

        .cart-floating .cart-count {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #4a8af4;
            color: #ffffff;
            font-size: 9px;
            font-weight: 700;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-floating .cart-total {
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
        }

        .cart-floating .cart-total .ton {
            color: #6e6e80;
            font-weight: 400;
        }

        /* CART MODAL */
        .cart-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            z-index: 300;
            display: none;
            justify-content: center;
            align-items: flex-end;
            animation: fadeUp 0.3s ease;
        }

        .cart-modal.open {
            display: flex;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cart-modal-content {
            background: #14141e;
            border-radius: 24px 24px 0 0;
            max-width: 430px;
            width: 100%;
            max-height: 75vh;
            padding: 20px 16px 30px 16px;
            overflow-y: auto;
        }

        .cart-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .cart-modal-header h2 {
            font-size: 20px;
            font-weight: 700;
        }

        .cart-close {
            background: rgba(255, 255, 255, 0.04);
            border: none;
            color: #8e8ea0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .cart-close:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .cart-item .item-info {
            flex: 1;
        }

        .cart-item .item-name {
            font-size: 14px;
            font-weight: 600;
        }

        .cart-item .item-collection {
            font-size: 11px;
            color: #6e6e80;
        }

        .cart-item .item-price {
            font-size: 13px;
            color: #4a8af4;
            font-weight: 600;
        }

        .cart-item .item-remove {
            background: rgba(255, 107, 107, 0.1);
            border: none;
            color: #ff6b6b;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 14px;
            cursor: pointer;
        }

        .cart-total-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0 8px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            margin-top: 8px;
        }

        .cart-total-section .total-label {
            font-size: 16px;
            font-weight: 600;
            color: #8e8ea0;
        }

        .cart-total-section .total-amount {
            font-size: 20px;
            font-weight: 800;
            color: #ffffff;
        }

        .cart-total-section .total-amount .ton {
            color: #8e8ea0;
            font-weight: 400;
            font-size: 14px;
        }

        .btn-checkout {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4a8af4, #6c5ce7);
            border: none;
            border-radius: 16px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 12px;
        }

        .btn-checkout:active {
            transform: scale(0.97);
        }

        .btn-checkout:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .empty-cart {
            text-align: center;
            padding: 40px 20px;
            color: #6e6e80;
        }

        .empty-cart .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        @media (max-width: 400px) {
            .nft-grid {
                gap: 8px;
                padding: 8px;
            }

            .nft-card.expanded .lottie-wrapper {
                width: 90px;
                height: 90px;
            }

            .nft-name-expanded {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <div class="header">
            <h1>🎁 Подарки</h1>
            <div class="stats"><span id="totalCount">0</span> NFT</div>
        </div>

        <div class="filters" id="filtersContainer">
            <button class="filter-btn active" data-collection="all">Все</button>
        </div>

        <div class="nft-grid" id="nftGrid">
            <div class="loading">
                <div class="spinner"></div>
                Загрузка подарков...
            </div>
        </div>

        <div class="cart-floating" id="cartFloating">
            <div class="cart-icon">
                🛒
                <span class="cart-count" id="cartCount">0</span>
            </div>
            <div class="cart-total">
                <span id="cartTotal">0.00</span> <span class="ton">GRAM</span>
            </div>
        </div>

        <div class="cart-modal" id="cartModal">
            <div class="cart-modal-content">
                <div class="cart-modal-header">
                    <h2>🛒 Корзина</h2>
                    <button class="cart-close" id="cartClose">✕</button>
                </div>
                <div id="cartItems"></div>
                <div class="cart-total-section">
                    <span class="total-label">Итого</span>
                    <span class="total-amount"><span id="modalCartTotal">0.00</span> <span class="ton">GRAM</span></span>
                </div>
                <button class="btn-checkout" id="checkoutBtn">Купить все</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 1. КОЛЛЕКЦИИ (16 штук)
        // ============================================================
        const COLLECTIONS_DATA = {
            "Hex Pot": { icon: "🔮", floorPrice: 12.5 },
            "Astral Shard": { icon: "💎", floorPrice: 8.2 },
            "Pixel Fox": { icon: "🦊", floorPrice: 5.7 },
            "Crystal Orb": { icon: "🔮", floorPrice: 15.3 },
            "Void Mask": { icon: "👹", floorPrice: 22.1 },
            "Plush Pepe": { icon: "🐸", floorPrice: 6.8 },
            "Bonded Ring": { icon: "💍", floorPrice: 45.2 },
            "Bow Tie Durov's Cap": { icon: "🎩", floorPrice: 89.7 },
            "Diamond Ring": { icon: "💎", floorPrice: 67.3 },
            "Evil Eye": { icon: "👁️", floorPrice: 4.5 },
            "Eternal Rose": { icon: "🌹", floorPrice: 34.8 },
            "Ion Gem": { icon: "⚡", floorPrice: 56.4 },
            "Kissed Frog": { icon: "🐸", floorPrice: 9.6 },
            "Nail Bracelet": { icon: "📿", floorPrice: 28.5 },
            "Precious Peach": { icon: "🍑", floorPrice: 42.3 },
            "Scared Cat": { icon: "🐱", floorPrice: 18.9 }
        };

        // ============================================================
        // 2. ГЕНЕРАЦИЯ NFT ДЛЯ ВСЕХ КОЛЛЕКЦИЙ
        // ============================================================
        function generateNFTs() {
            const allNFTs = [];
            const collections = Object.keys(COLLECTIONS_DATA);

            // Для каждой коллекции генерируем по 6-8 NFT
            collections.forEach((collection, colIndex) => {
                const count = 6 + (colIndex % 3); // 6, 7, или 8
                const baseNumber = colIndex * 1000 + 100;

                // Модели для каждой коллекции
                const models = {
                    "Hex Pot": ["Violet Veil", "Blood Moon", "Emerald", "Golden", "Crystal", "Shadow", "Sunset",
                        "Frost"
                    ],
                    "Astral Shard": ["Nebula", "Supernova", "Galaxy", "Pulsar", "Quasar", "Void", "Stellar",
                        "Cosmic"
                    ],
                    "Pixel Fox": ["Cyber", "Vaporwave", "Retro", "Glitch", "Neon", "Classic", "Modern", "Pixel"],
                    "Crystal Orb": ["Sapphire", "Ruby", "Amethyst", "Emerald", "Diamond", "Opal", "Topaz", "Jade"],
                    "Void Mask": ["Obsidian", "Moonstone", "Shadow", "Celestial", "Abyss", "Eclipse", "Dusk",
                        "Aurora"
                    ],
                    "Plush Pepe": ["Classic", "Rare", "Legendary", "Golden", "Rainbow", "Dark", "Shiny", "Mystic"],
                    "Bonded Ring": ["Silver", "Gold", "Platinum", "Rose", "Black", "White", "Titanium", "Mithril"],
                    "Bow Tie Durov's Cap": ["Classic", "Limited", "Ultra Rare", "Gold", "Diamond", "Platinum",
                        "Royal", "Supreme"
                    ],
                    "Diamond Ring": ["Classic", "Royal", "Imperial", "Elegant", "Crown", "Pearl", "Sapphire",
                        "Ruby"
                    ],
                    "Evil Eye": ["Classic", "Dark", "Ancient", "Golden", "Crystal", "Shadow", "Light", "Storm"],
                    "Eternal Rose": ["Red", "Blue", "Golden", "White", "Black", "Pink", "Purple", "Rainbow"],
                    "Ion Gem": ["Blue", "Red", "Rainbow", "Gold", "Plasma", "Fusion", "Quantum", "Infinite"],
                    "Kissed Frog": ["Prince", "Princess", "King", "Queen", "Jester", "Mage", "Knight", "Dragon"],
                    "Nail Bracelet": ["Silver", "Gold", "Rose", "Diamond", "Pearl", "Ruby", "Sapphire", "Emerald"],
                    "Precious Peach": ["Golden", "Royal", "Sweet", "Honey", "Sunset", "Blush", "Tropical",
                    "Deluxe"],
                    "Scared Cat": ["Shadow", "Ghost", "Spirit", "Phantom", "Wraith", "Specter", "Ghoul", "Demon"]
                };

                const descriptions = {
                    "Hex Pot": "Mystical hexagonal NFT with unique powers",
                    "Astral Shard": "Cosmic fragment from the astral plane",
                    "Pixel Fox": "Retro pixel art fox with unique traits",
                    "Crystal Orb": "Elemental orb with mystical properties",
                    "Void Mask": "Ancient mask from the void dimension",
                    "Plush Pepe": "Collectible plush frog from the swamp",
                    "Bonded Ring": "Eternal ring bonded by ancient magic",
                    "Bow Tie Durov's Cap": "Durov's legendary bow tie cap",
                    "Diamond Ring": "Rare diamond ring from the deep earth",
                    "Evil Eye": "Protective amulet against dark forces",
                    "Eternal Rose": "Immortal rose that never withers",
                    "Ion Gem": "Crystalline gem charged with cosmic energy",
                    "Kissed Frog": "Magical frog that transforms with a kiss",
                    "Nail Bracelet": "Elegant bracelet with mystical gems",
                    "Precious Peach": "Rare enchanted peach with golden aura",
                    "Scared Cat": "Mysterious cat from the shadow realm"
                };

                const backdrops = ["Starlight", "Midnight", "Cosmic", "Void", "Crystal", "Flame", "Frost", "Storm"];

                for (let i = 0; i < count; i++) {
                    const num = baseNumber + i;
                    const model = models[collection] ? models[collection][i % models[collection].length] : "Classic";
                    const backdrop = backdrops[i % backdrops.length];
                    const price = (COLLECTIONS_DATA[collection].floorPrice + (i * 1.2 + Math.random() * 2)).toFixed(1);
                    const statuses = ["for-sale", "for-sale", "for-sale", "for-sale", "on-auction", "sold", "sold"];
                    const status = i < 4 ? "for-sale" : statuses[i % statuses.length];

                    // Формируем имя для Lottie URL
                    const slug = collection.toLowerCase()
                        .replace(/\s/g, '')
                        .replace(/'/g, '')
                        .replace(/đ/g, 'durovs');

                    allNFTs.push({
                        name: `${collection} #${num}`,
                        collection: collection,
                        lottie: `https://nft.fragment.com/gift/${slug}-${num}.lottie.json`,
                        description: descriptions[collection] || "Unique NFT gift",
                        attributes: [
                            { trait_type: "Model", value: model },
                            { trait_type: "Backdrop", value: backdrop },
                            { trait_type: "Rarity", value: ["Common", "Uncommon", "Rare", "Epic", "Legendary"][i %
                                5] }
                        ],
                        price: parseFloat(price),
                        status: status,
                        number: num
                    });
                }
            });

            return allNFTs;
        }

        const NFT_DATA = generateNFTs();

        // ============================================================
        // 3. КОРЗИНА
        // ============================================================
        let cart = JSON.parse(localStorage.getItem('nft_cart') || '[]');

        function saveCart() {
            localStorage.setItem('nft_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function addToCart(nftName) {
            if (cart.includes(nftName)) {
                cart = cart.filter(item => item !== nftName);
            } else {
                cart.push(nftName);
            }
            saveCart();
            renderGrid();
        }

        function removeFromCart(nftName) {
            cart = cart.filter(item => item !== nftName);
            saveCart();
            renderCartItems();
            updateCartUI();
        }

        function getCartTotal() {
            return cart.reduce((sum, name) => {
                const nft = NFT_DATA.find(n => n.name === name);
                return sum + (nft ? nft.price : 0);
            }, 0);
        }

        function isInCart(nftName) {
            return cart.includes(nftName);
        }

        function updateCartUI() {
            const count = cart.length;
            const total = getCartTotal();

            document.getElementById('cartCount').textContent = count;
            document.getElementById('cartTotal').textContent = total.toFixed(2);
            document.getElementById('modalCartTotal').textContent = total.toFixed(2);
            document.getElementById('checkoutBtn').disabled = count === 0;
            renderCartItems();
        }

        function renderCartItems() {
            const container = document.getElementById('cartItems');
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <div class="icon">🛒</div>
                        <p>Корзина пуста</p>
                        <p style="font-size:13px; margin-top:4px; color:#6e6e80;">Добавьте NFT для покупки</p>
                    </div>
                `;
                return;
            }

            let html = '';
            cart.forEach(name => {
                const nft = NFT_DATA.find(n => n.name === name);
                if (!nft) return;
                html += `
                    <div class="cart-item">
                        <div style="width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:18px;">
                            ${COLLECTIONS_DATA[nft.collection]?.icon || '🎁'}
                        </div>
                        <div class="item-info">
                            <div class="item-name">${nft.name}</div>
                            <div class="item-collection">${nft.collection}</div>
                        </div>
                        <div class="item-price">${nft.price.toFixed(2)} GRAM</div>
                        <button class="item-remove" onclick="removeFromCart('${nft.name}')">✕</button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // ============================================================
        // 4. ГЕНЕРАЦИЯ ЦВЕТОВ
        // ============================================================
        function getCollectionColors(collectionName) {
            const hash = collectionName.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
            const hue1 = (hash * 137.5) % 360;
            const hue2 = (hue1 + 40) % 360;
            const sat = 55 + (hash % 20);
            const lig = 20 + (hash % 15);
            return {
                bg: `hsl(${hue1}, ${sat}%, ${lig}%)`,
                bgGradient: `linear-gradient(145deg, hsl(${hue1}, ${sat}%, ${lig-5}%), hsl(${hue2}, ${sat-10}%, ${lig+5}%))`,
                accent: `hsl(${hue1}, ${sat+20}%, ${lig+25}%)`
            };
        }

        // ============================================================
        // 5. РЕНДЕРИНГ
        // ============================================================
        let currentFilter = 'all';
        let expandedCard = null;
        const grid = document.getElementById('nftGrid');
        const filtersContainer = document.getElementById('filtersContainer');

        // Фильтры
        const collections = ['all', ...Object.keys(COLLECTIONS_DATA)];

        collections.forEach(col => {
            const btn = document.createElement('button');
            btn.className = `filter-btn${col === 'all' ? ' active' : ''}`;
            btn.dataset.collection = col;
            const icon = col === 'all' ? '📋' : COLLECTIONS_DATA[col]?.icon || '🎁';
            btn.textContent = col === 'all' ? 'Все' : `${icon} ${col}`;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = col;
                expandedCard = null;
                renderGrid();
            });
            filtersContainer.appendChild(btn);
        });

        document.getElementById('totalCount').textContent = NFT_DATA.length;

        function renderGrid() {
            const filtered = currentFilter === 'all' ?
                NFT_DATA :
                NFT_DATA.filter(item => item.collection === currentFilter);

            if (filtered.length === 0) {
                grid.innerHTML =
                    `<div class="loading" style="grid-column:1/-1;padding:40px 20px;color:#6e6e80;">Нет подарков в этой коллекции</div>`;
                return;
            }

            let html = '';

            filtered.forEach((nft, index) => {
                const colors = getCollectionColors(nft.collection);
                const number = nft.number || nft.name.match(/#(\d+)/)?.[1] || '0000';
                const model = nft.attributes.find(a => a.trait_type === 'Model')?.value || '';
                const backdrop = nft.attributes.find(a => a.trait_type === 'Backdrop')?.value || '';
                const rarity = nft.attributes.find(a => a.trait_type === 'Rarity')?.value || '';

                const lottieId = `lottie-${nft.collection.replace(/\s/g, '')}-${number}`;
                const isExpanded = expandedCard === nft.name;

                const statusEmoji = {
                    'sold': '🔴',
                    'for-sale': '🟢',
                    'on-auction': '🟡'
                } [nft.status] || '⚪';

                const statusLabel = {
                    'sold': 'Продано',
                    'for-sale': 'В продаже',
                    'on-auction': 'На аукционе'
                } [nft.status] || '';

                const statusClass = {
                    'sold': 'sold',
                    'for-sale': 'for-sale',
                    'on-auction': 'on-auction'
                } [nft.status] || '';

                const inCart = isInCart(nft.name);

                html += `
                    <div class="nft-card ${isExpanded ? 'expanded' : ''}" 
                         data-name="${nft.name}"
                         onclick="toggleExpand('${nft.name}')">
                        <div class="nft-card-inner" style="background: ${colors.bgGradient};">
                            <div class="lottie-wrapper" style="background: ${colors.bg};">
                                <div class="lottie-container" id="${lottieId}"></div>
                                ${nft.status !== 'for-sale' ? `<div class="status-badge ${statusClass}">${statusEmoji} ${statusLabel}</div>` : ''}
                            </div>

                            <!-- COMPACT INFO -->
                            <div class="nft-info-compact">
                                <div class="nft-name-compact">${nft.name}</div>
                                <div class="nft-model-compact">${model}</div>
                                <div class="nft-price" style="font-size:13px;margin-top:4px;">
                                    <span class="gram-icon">G</span>
                                    ${nft.price > 0 ? `${nft.price.toFixed(1)}` : '—'}
                                </div>
                            </div>

                            <!-- EXPANDED INFO -->
                            <div class="nft-info-expanded">
                                <div class="nft-name-expanded">${nft.collection}</div>
                                <div class="nft-number-expanded">#${number}</div>
                                <div class="nft-description">${nft.description || 'Unique NFT gift from Telegram'}</div>
                                <div class="nft-details">
                                    ${model ? `<div class="nft-detail-item"><span class="label">Модель:</span> <span class="value">${model}</span></div>` : ''}
                                    ${backdrop ? `<div class="nft-detail-item"><span class="label">Фон:</span> <span class="value">${backdrop}</span></div>` : ''}
                                    ${rarity ? `<div class="nft-detail-item"><span class="label">Редкость:</span> <span class="value">${rarity}</span></div>` : ''}
                                </div>
                                <div class="nft-price">
                                    <span class="gram-icon">G</span>
                                    ${nft.price > 0 ? `${nft.price.toFixed(2)} GRAM` : 'Не в продаже'}
                                    ${nft.price > 0 ? `<span class="usd">≈ $${(nft.price * 5.2).toFixed(2)}</span>` : ''}
                                </div>
                                <button class="btn-buy ${nft.status === 'sold' || nft.price === 0 ? 'sold-out' : ''}" 
                                        onclick="event.stopPropagation(); ${nft.status !== 'sold' && nft.price > 0 ? `addToCart('${nft.name}')` : ''}"
                                        ${nft.status === 'sold' || nft.price === 0 ? 'disabled' : ''}>
                                    ${nft.status === 'sold' ? '🔴 Продано' : inCart ? '✓ В корзине' : '💎 Купить'}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = html;

            // Загрузка Lottie
            setTimeout(() => {
                filtered.forEach((nft) => {
                    const number = nft.number || nft.name.match(/#(\d+)/)?.[1] || '0000';
                    const containerId = `lottie-${nft.collection.replace(/\s/g, '')}-${number}`;
                    const container = document.getElementById(containerId);

                    if (container && nft.lottie) {
                        try {
                            const anim = lottie.loadAnimation({
                                container: container,
                                path: nft.lottie,
                                renderer: 'svg',
                                loop: true,
                                autoplay: true
                            });

                            const colors = getCollectionColors(nft.collection);
                            container.style.background = colors.bg;

                            document.addEventListener('visibilitychange', () => {
                                if (!document.hidden) {
                                    anim.play();
                                }
                            });

                        } catch (e) {
                            console.warn('Lottie error:', e);
                            container.innerHTML =
                                `<div style="color:#6e6e80;font-size:28px;">${COLLECTIONS_DATA[nft.collection]?.icon || '🎁'}</div>`;
                        }
                    }
                });
                updateCartUI();
            }, 200);
        }

        // ============================================================
        // 6. РАЗВОРАЧИВАНИЕ КАРТОЧКИ
        // ============================================================
        function toggleExpand(name) {
            if (expandedCard === name) {
                expandedCard = null;
            } else {
                expandedCard = name;
            }
            renderGrid();
            // Прокрутка к карточке
            setTimeout(() => {
                const expanded = document.querySelector('.nft-card.expanded');
                if (expanded) {
                    expanded.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 100);
        }

        // ============================================================
        // 7. КОРЗИНА - ОТКРЫТИЕ/ЗАКРЫТИЕ
        // ============================================================
        const cartModal = document.getElementById('cartModal');

        document.getElementById('cartFloating').addEventListener('click', () => {
            cartModal.classList.toggle('open');
            renderCartItems();
            updateCartUI();
        });

        document.getElementById('cartClose').addEventListener('click', () => {
            cartModal.classList.remove('open');
        });

        cartModal.addEventListener('click', (e) => {
            if (e.target === cartModal) cartModal.classList.remove('open');
        });

        document.getElementById('checkoutBtn').addEventListener('click', () => {
            if (cart.length === 0) return;
            const total = getCartTotal();
            if (confirm(`💎 Подтвердите покупку ${cart.length} NFT на сумму ${total.toFixed(2)} GRAM`)) {
                alert(`✅ Покупка оформлена!\nКуплено: ${cart.length} NFT\nСумма: ${total.toFixed(2)} GRAM`);
                cart = [];
                saveCart();
                cartModal.classList.remove('open');
                renderGrid();
            }
        });

        // ============================================================
        // 8. ЗАПУСК
        // ============================================================
        renderGrid();
        updateCartUI();
    </script>

</body>
</html>
