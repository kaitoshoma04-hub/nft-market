<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NFT Маркет</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 10px;
    }
    .phone {
      max-width: 375px;
      width: 100%;
      background: #0d0d10;
      border-radius: 32px;
      padding: 14px 12px 70px;
      border: 1px solid #222;
      position: relative;
    }

    /* Хедер с закрыто */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0 14px;
      border-bottom: 1px solid #1a1a1e;
    }
    .header .closed {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }
    .header .closed span {
      color: #888;
      font-weight: 400;
    }
    .header .close {
      font-size: 20px;
      color: #888;
    }

    /* Баннер WEB */
    .web-banner {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-radius: 18px;
      padding: 14px 16px;
      margin: 14px 0;
      border: 1px solid #2a2a3e;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }
    .web-banner .left .big {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }
    .web-banner .left .small {
      font-size: 12px;
      color: #888;
    }
    .web-banner .right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    .web-banner .right .prize {
      background: #6c6cff;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 500;
      color: #fff;
      white-space: nowrap;
    }
    .web-banner .right .more {
      font-size: 12px;
      color: #6c6cff;
      cursor: default;
    }

    /* Вкладки подарки */
    .gift-tabs {
      display: flex;
      gap: 12px;
      font-size: 13px;
      color: #666;
      padding: 4px 0 12px;
      border-bottom: 1px solid #1a1a1e;
      margin-bottom: 14px;
    }
    .gift-tabs .active {
      color: #fff;
      font-weight: 500;
      border-bottom: 2px solid #6c6cff;
      padding-bottom: 10px;
    }

    /* Поиск */
    .search {
      background: #18181c;
      border-radius: 30px;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 14px 0 16px;
      border: 1px solid #28282c;
    }
    .search input {
      background: transparent;
      border: none;
      color: #ddd;
      font-size: 14px;
      flex: 1;
      outline: none;
    }
    .search input::placeholder {
      color: #555;
    }
    .search .icon {
      color: #666;
      font-size: 16px;
    }

    /* Фильтры */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 12px;
      color: #888;
      margin-bottom: 14px;
    }
    .filters span {
      background: #18181c;
      padding: 4px 12px;
      border-radius: 30px;
      border: 1px solid #28282c;
    }
    .filters .active {
      border-color: #6c6cff;
      color: #fff;
    }

    /* NFT карточки */
    .nft-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin: 10px 0;
    }
    .nft-card {
      background: #141418;
      border-radius: 14px;
      padding: 12px 10px 14px;
      border: 1px solid #222226;
      text-align: left;
      position: relative;
    }
    .nft-card .lottie-gift {
      width: 40px;
      height: 40px;
      margin: 0 auto 6px;
    }
    .nft-card .name {
      font-size: 12px;
      font-weight: 500;
      color: #eee;
      line-height: 1.3;
    }
    .nft-card .hash {
      font-size: 11px;
      color: #666;
      margin: 2px 0;
    }
    .nft-card .price {
      font-size: 14px;
      font-weight: 600;
      color: #eee;
      margin-top: 4px;
    }
    .nft-card .minted {
      background: #6c6cff;
      border-radius: 30px;
      padding: 2px 12px;
      font-size: 10px;
      font-weight: 500;
      color: #fff;
      display: inline-block;
      margin-top: 4px;
    }

    /* Нижняя навигация */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #0a0a0e;
      border-top: 1px solid #1a1a1e;
      display: flex;
      justify-content: space-around;
      padding: 8px 0 6px;
      max-width: 375px;
      margin: 0 auto;
      border-radius: 0 0 32px 32px;
    }
    .bottom-nav .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #555;
      font-size: 10px;
      gap: 1px;
      cursor: default;
    }
    .bottom-nav .nav-item.active {
      color: #6c6cff;
    }
    .bottom-nav .nav-item .lottie-icon {
      width: 24px;
      height: 24px;
    }
    .bottom-nav .nav-item span {
      font-size: 10px;
    }

    .mt-2 { margin-top: 8px; }
    .mb-2 { margin-bottom: 8px; }
  </style>
</head>
<body>
<div class="phone">

  <!-- ===== HEADER ===== -->
  <div class="header">
    <div class="closed">Закрыто: <span>1512</span></div>
    <span class="close">✕</span>
  </div>

  <!-- ===== WEB БАННЕР ===== -->
  <div class="web-banner">
    <div class="left">
      <div class="big">WEB Лидерборд и задания</div>
      <div class="small">$50,000 призовой фонд</div>
    </div>
    <div class="right">
      <span class="prize">$50,000 призовой фонд</span>
      <span class="more">Узнать больше →</span>
    </div>
  </div>

  <!-- ===== ВКЛАДКИ ПОДАРКИ ===== -->
  <div class="gift-tabs">
    <span class="active">Подарки</span>
    <span>Звезды и Прем</span>
    <span>Коллекции</span>
  </div>

  <!-- ===== ПОИСК ===== -->
  <div class="search">
    <span class="icon">🔍</span>
    <input placeholder="Поиск по названию NFT / номеру">
    <span class="icon">Feed</span>
  </div>

  <!-- ===== ФИЛЬТРЫ ===== -->
  <div class="filters">
    <span class="active">NFT ▼</span>
    <span>Модель ▼</span>
    <span>Фон ▼</span>
    <span>Символ ▼</span>
  </div>

  <!-- ===== NFT КАРТОЧКИ ===== -->
  <div class="nft-grid">
    <!-- Liberty Figure -->
    <div class="nft-card">
      <div class="lottie-gift" id="gift1"></div>
      <div class="name">Liberty Figure</div>
      <div class="hash">#234020</div>
      <div class="price">4.9</div>
    </div>

    <!-- Jack-in-the-Box -->
    <div class="nft-card">
      <div class="lottie-gift" id="gift2"></div>
      <div class="name">Jack-in-the-Box</div>
      <div class="hash">#38228</div>
      <div class="price">3.39</div>
      <div class="minted">Minted</div>
    </div>

    <!-- Spy Agaric -->
    <div class="nft-card">
      <div class="lottie-gift" id="gift3"></div>
      <div class="name">Spy Agaric</div>
      <div class="hash">#9576</div>
      <div class="price">61.22</div>
    </div>
  </div>

  <!-- ===== НИЖНЯЯ НАВИГАЦИЯ ===== -->
  <div class="bottom-nav">
    <div class="nav-item active">
      <div class="lottie-icon" id="nav1"></div>
      <span>Маркет</span>
    </div>
    <div class="nav-item">
      <div class="lottie-icon" id="nav2"></div>
      <span>Ордеры</span>
    </div>
    <div class="nav-item">
      <div class="lottie-icon" id="nav3"></div>
      <span>Игровой хаб</span>
    </div>
    <div class="nav-item">
      <div class="lottie-icon" id="nav4"></div>
      <span>Задания</span>
    </div>
    <div class="nav-item">
      <div class="lottie-icon" id="nav5"></div>
      <span>Хранилище</span>
    </div>
  </div>

</div>

<script>
  // Анимации для подарков (подарочные коробки с эффектами)
  const giftAnimations = [
    {
      id: 'gift1',
      url: 'https://assets10.lottiefiles.com/packages/lf20_8p6z4i6m.json' // подарок с бантом
    },
    {
      id: 'gift2',
      url: 'https://assets4.lottiefiles.com/packages/lf20_9c8m4rqk.json' // подарок с конфетти
    },
    {
      id: 'gift3',
      url: 'https://assets1.lottiefiles.com/packages/lf20_6m8p9q4n.json' // подарок с блеском
    }
  ];

  // Анимации для иконок нижнего меню
  const navAnimations = [
    {
      id: 'nav1',
      url: 'https://assets5.lottiefiles.com/packages/lf20_8p6z4i6m.json' // дом
    },
    {
      id: 'nav2',
      url: 'https://assets9.lottiefiles.com/packages/lf20_9c8m4rqk.json' // список
    },
    {
      id: 'nav3',
      url: 'https://assets6.lottiefiles.com/packages/lf20_6m8p9q4n.json' // игра
    },
    {
      id: 'nav4',
      url: 'https://assets7.lottiefiles.com/packages/lf20_5n7p4r8m.json' // задания
    },
    {
      id: 'nav5',
      url: 'https://assets8.lottiefiles.com/packages/lf20_4k6p9q2n.json' // хранилище
    }
  ];

  // Запускаем анимации подарков
  giftAnimations.forEach(anim => {
    const container = document.getElementById(anim.id);
    if (container) {
      const animation = lottie.loadAnimation({
        container: container,
        renderer: 'svg',
        loop: true,
        autoplay: true,
        path: anim.url
      });
    }
  });

  // Запускаем анимации навигации
  navAnimations.forEach(anim => {
    const container = document.getElementById(anim.id);
    if (container) {
      const animation = lottie.loadAnimation({
        container: container,
        renderer: 'svg',
        loop: true,
        autoplay: true,
        path: anim.url
      });
    }
  });

  // Если Lottie не загрузился, показываем эмодзи вместо анимаций
  setTimeout(() => {
    document.querySelectorAll('.lottie-gift').forEach(el => {
      if (el.children.length === 0) {
        el.innerHTML = '🎁';
        el.style.fontSize = '28px';
        el.style.textAlign = 'center';
        el.style.lineHeight = '40px';
      }
    });
    document.querySelectorAll('.lottie-icon').forEach(el => {
      if (el.children.length === 0) {
        const icons = ['🏠', '📋', '🎮', '📌', '📦'];
        const idx = Array.from(el.parentElement.parentElement.children).indexOf(el.parentElement);
        el.innerHTML = icons[idx] || '•';
        el.style.fontSize = '20px';
        el.style.textAlign = 'center';
        el.style.lineHeight = '24px';
      }
    });
  }, 3000);
</script>

</body>
</html>
