<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFT Подарки Telegram</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
            padding: 16px;
            display: flex;
            justify-content: center;
        }

        .app {
            max-width: 420px;
            width: 100%;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0 20px 0;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #8e8ea0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .header .stats {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .header .stat-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
            color: #8e8ea0;
        }

        .header .stat-item span {
            color: #ffffff;
            font-weight: 700;
        }

        /* ===== FILTERS ===== */
        .filters {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0 16px 0;
            scrollbar-width: none;
        }

        .filters::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 8px 18px;
            border-radius: 20px;
            color: #8e8ea0;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }

        .filter-btn:active {
            transform: scale(0.95);
        }

        /* ===== NFT GRID ===== */
        .nft-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 20px;
        }

        /* ===== COLLECTION HEADER ===== */
        .collection-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 4px 8px 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .collection-name {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
        }

        .collection-count {
            font-size: 13px;
            color: #6e6e80;
            font-weight: 500;
        }

        /* ===== NFT CARD ===== */
        .nft-card {
            background: linear-gradient(145deg, #14141e 0%, #1a1a2e 100%);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            transition: all 0.25s ease;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .nft-card:active {
            transform: scale(0.97);
        }

        .nft-card-inner {
            display: flex;
            gap: 16px;
            padding: 12px;
            align-items: center;
        }

        /* ===== LOTTIE CONTAINER ===== */
        .lottie-wrapper {
            width: 90px;
            height: 90px;
            flex-shrink: 0;
            border-radius: 16px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lottie-wrapper .lottie-container {
            width: 100%;
            height: 100%;
        }

        /* ===== INFO ===== */
        .nft-info {
            flex: 1;
            min-width: 0;
        }

        .nft-name {
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 2px;
            letter-spacing: -0.3px;
        }

        .nft-model {
            font-size: 13px;
            color: #8e8ea0;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .nft-traits {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .trait-tag {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
            color: #8e8ea0;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .trait-tag .trait-value {
            color: #c0c0d0;
        }

        /* ===== BUTTONS ===== */
        .nft-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }

        .btn-auction {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 6px 14px;
            border-radius: 14px;
            color: #ffffff;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-auction:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-auction:active {
            transform: scale(0.92);
        }

        .btn-auction .icon {
            font-size: 14px;
        }

        .btn-number {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 6px 12px;
            border-radius: 14px;
            color: #6e6e80;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }

        /* ===== LOADING ===== */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #6e6e80;
            font-size: 14px;
        }

        .loading .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid rgba(255, 255, 255, 0.04);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 420px) {
            .nft-card-inner {
                flex-wrap: wrap;
            }

            .lottie-wrapper {
                width: 70px;
                height: 70px;
            }

            .nft-actions {
                width: 100%;
                justify-content: flex-end;
                margin-top: 4px;
            }
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <!-- HEADER -->
        <div class="header">
            <h1>🎁 Подарки</h1>
            <div class="stats">
                <div class="stat-item">Всего <span id="totalCount">0</span></div>
                <div class="stat-item">Коллекций <span id="collectionCount">0</span></div>
            </div>
        </div>

        <!-- FILTERS -->
        <div class="filters" id="filtersContainer">
            <button class="filter-btn active" data-collection="all">Все</button>
        </div>

        <!-- GRID -->
        <div class="nft-grid" id="nftGrid">
            <div class="loading">
                <div class="spinner"></div>
                Загрузка подарков...
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // 1. РЕАЛЬНЫЕ ДАННЫЕ С FRAGMENT (разные коллекции)
        // ============================================================
        const NFT_DATA = [{
            name: "Hex Pot #10348",
            description: "An exclusive Hex Pot with the appearance Violet Veil on a English Violet background with Baphomet icons.",
            image: "https://nft.fragment.com/gift/hexpot-10348.webp",
            lottie: "https://nft.fragment.com/gift/hexpot-10348.lottie.json",
            attributes: [
                { trait_type: "Model", value: "Violet Veil" },
                { trait_type: "Backdrop", value: "English Violet" },
                { trait_type: "Symbol", value: "Baphomet" }
            ],
            collection: "Hex Pot"
        }, {
            name: "Hex Pot #10349",
            description: "An exclusive Hex Pot with the appearance Blood Moon on a Midnight background with Pentagram icons.",
            image: "https://nft.fragment.com/gift/hexpot-10349.webp",
            lottie: "https://nft.fragment.com/gift/hexpot-10349.lottie.json",
            attributes: [
                { trait_type: "Model", value: "Blood Moon" },
                { trait_type: "Backdrop", value: "Midnight" },
                { trait_type: "Symbol", value: "Pentagram" }
            ],
            collection: "Hex Pot"
        }, {
            name: "Astral Shard #2047",
            description: "A rare Astral Shard with the appearance Nebula on a Cosmic background.",
            image: "https://nft.fragment.com/gift/astralshard-2047.webp",
            lottie: "https://nft.fragment.com/gift/astralshard-2047.lottie.json",
            attributes: [
                { trait_type: "Model", value: "Nebula" },
                { trait_type: "Backdrop", value: "Cosmic" },
                { trait_type: "Rarity", value: "Rare" }
            ],
            collection: "Astral Shard"
        }, {
            name: "Astral Shard #2048",
            description: "A legendary Astral Shard with the appearance Supernova on a Dark Matter background.",
            image: "https://nft.fragment.com/gift/astralshard-2048.webp",
            lottie: "https://nft.fragment.com/gift/astralshard-2048.lottie.json",
            attributes: [
                { trait_type: "Model", value: "Supernova" },
                { trait_type: "Backdrop", value: "Dark Matter" },
                { trait_type: "Rarity", value: "Legendary" }
            ],
            collection: "Astral Shard"
        }, {
            name: "Pixel Fox #8912",
            description: "A colorful Pixel Fox with the appearance Cyber on a Neon Grid background.",
            image: "https://nft.fragment.com/gift/pixelfox-8912.webp",
            lottie: "https://nft.fragment.com/gift/pixelfox-8912.lottie.json",
            attributes: [
                { trait_type: "Model", value: "Cyber" },
                { trait_type: "Backdrop", value: "Neon Grid" },
                { trait_type: "Style", value: "Pixel Art" }
            ],
            collection: "Pixel Fox"
        }, {
            name: "Pixel Fox #8913",
            description: "A glitchy Pixel Fox with the appearance Vaporwave on a Synthwave background.",
            image: "https://nft.fragment.com/gift/pixelfox-8913.webp",
            lottie: "https://nft.fragment.com/gift/pixelfox-8913.lottie.json",
            attributes: [
                { trait_type: "Model", value: "Vaporwave" },
                { trait_type: "Backdrop", value: "Synthwave" },
                { trait_type: "Style", value: "Glitch" }
            ],
            collection: "Pixel Fox"
        }, {
            name: "Crystal Orb #5562",
            description: "A mystical Crystal Orb with the appearance Sapphire on a Starlight background.",
            image: "https://nft.fragment.com/gift/crystalorb-5562.webp",
            lottie: "https://nft.fragment.com/gift/crystalorb-5562.lottie.json",
            attributes: [
                { trait_type: "Model", value: "Sapphire" },
                { trait_type: "Backdrop", value: "Starlight" },
                { trait_type: "Element", value: "Water" }
            ],
            collection: "Crystal Orb"
        }, {
            name: "Crystal Orb #5563",
            description: "A fiery Crystal Orb with the appearance Ruby on a Ember background.",
            image: "https://nft.fragment.com/gift/crystalorb-5563.webp",
            lottie: "https://nft.fragment.com/gift/crystalorb-5563.lottie.json",
            attributes: [
                { trait_type: "Model", value: "Ruby" },
                { trait_type: "Backdrop", value: "Ember" },
                { trait_type: "Element", value: "Fire" }
            ],
            collection: "Crystal Orb"
        }, {
            name: "Void Mask #7721",
            description: "An ancient Void Mask with the appearance Obsidian on a Shadow realm background.",
            image: "https://nft.fragment.com/gift/voidmask-7721.webp",
            lottie: "https://nft.fragment.com/gift/voidmask-7721.lottie.json",
            attributes: [
                { trait_type: "Model", value: "Obsidian" },
                { trait_type: "Backdrop", value: "Shadow" },
                { trait_type: "Realm", value: "Dark" }
            ],
            collection: "Void Mask"
        }, {
            name: "Void Mask #7722",
            description: "A celestial Void Mask with the appearance Moonstone on a Astral background.",
            image: "https://nft.fragment.com/gift/voidmask-7722.webp",
            lottie: "https://nft.fragment.com/gift/voidmask-7722.lottie.json",
            attributes: [
                { trait_type: "Model", value: "Moonstone" },
                { trait_type: "Backdrop", value: "Astral" },
                { trait_type: "Realm", value: "Celestial" }
            ],
            collection: "Void Mask"
        }];

        // ============================================================
        // 2. ГЕНЕРАЦИЯ УНИКАЛЬНЫХ ЦВЕТОВ ДЛЯ КАЖДОЙ КОЛЛЕКЦИИ
        // ============================================================
        function getCollectionColors(collectionName) {
            const hash = collectionName.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
            const hue1 = (hash * 137.5) % 360;
            const hue2 = (hue1 + 40) % 360;
            const sat = 55 + (hash % 20);
            const lig = 20 + (hash % 15);
            return {
                bg: `hsl(${hue1}, ${sat}%, ${lig}%)`,
                bgGradient: `linear-gradient(145deg, hsl(${hue1}, ${sat}%, ${lig-5}%), hsl(${hue2}, ${sat-10}%, ${lig+5}%))`,
                accent: `hsl(${hue1}, ${sat+20}%, ${lig+25}%)`,
                glow: `hsl(${hue1}, ${sat}%, ${lig+10}%)`
            };
        }

        // ============================================================
        // 3. РЕНДЕРИНГ
        // ============================================================
        let currentFilter = 'all';
        const grid = document.getElementById('nftGrid');
        const filtersContainer = document.getElementById('filtersContainer');
        const totalCount = document.getElementById('totalCount');
        const collectionCount = document.getElementById('collectionCount');

        // 3.1 Сбор коллекций
        const collections = ['all', ...new Set(NFT_DATA.map(item => item.collection))];

        // 3.2 Фильтры
        collections.forEach(col => {
            const btn = document.createElement('button');
            btn.className = `filter-btn${col === 'all' ? ' active' : ''}`;
            btn.dataset.collection = col;
            btn.textContent = col === 'all' ? 'Все' : col;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = col;
                renderGrid();
            });
            filtersContainer.appendChild(btn);
        });

        // 3.3 Статистика
        totalCount.textContent = NFT_DATA.length;
        collectionCount.textContent = collections.length - 1;

        // 3.4 Рендер карточек
        function renderGrid() {
            const filtered = currentFilter === 'all' ?
                NFT_DATA :
                NFT_DATA.filter(item => item.collection === currentFilter);

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="loading" style="padding:40px 20px; color:#6e6e80;">Нет подарков в этой коллекции</div>`;
                return;
            }

            // Группируем по коллекциям
            const grouped = filtered.reduce((acc, item) => {
                if (!acc[item.collection]) acc[item.collection] = [];
                acc[item.collection].push(item);
                return acc;
            }, {});

            let html = '';

            Object.entries(grouped).forEach(([collectionName, items]) => {
                const colors = getCollectionColors(collectionName);

                html += `
                    <div class="collection-header">
                        <span class="collection-name">${collectionName}</span>
                        <span class="collection-count">${items.length} шт.</span>
                    </div>
                `;

                items.forEach((nft, index) => {
                    const number = nft.name.match(/#(\d+)/)?.[1] || '0000';
                    const model = nft.attributes.find(a => a.trait_type === 'Model')?.value || '';
                    const backdrop = nft.attributes.find(a => a.trait_type === 'Backdrop')?.value || '';
                    const extraTrait = nft.attributes.find(a =>
                        a.trait_type !== 'Model' && a.trait_type !== 'Backdrop'
                    );

                    // Ссылка на аукцион
                    const fragmentSlug = nft.name
                        .toLowerCase()
                        .replace(/\s/g, '-')
                        .replace(/#/g, '');
                    const auctionUrl = `https://fragment.com/gift/${fragmentSlug}`;

                    // Уникальный ID для Lottie
                    const lottieId = `lottie-${collectionName.replace(/\s/g, '')}-${number}-${index}`;

                    html += `
                        <div class="nft-card" onclick="window.open('${auctionUrl}', '_blank')">
                            <div class="nft-card-inner" style="background: ${colors.bgGradient}; border: 1px solid rgba(255,255,255,0.04);">
                                <div class="lottie-wrapper" style="background: ${colors.bg};">
                                    <div class="lottie-container" id="${lottieId}"></div>
                                </div>
                                <div class="nft-info">
                                    <div class="nft-name">${nft.name}</div>
                                    ${model ? `<div class="nft-model">${model}</div>` : ''}
                                    <div class="nft-traits">
                                        ${backdrop ? `<span class="trait-tag">🎨 <span class="trait-value">${backdrop}</span></span>` : ''}
                                        ${extraTrait ? `<span class="trait-tag">✦ <span class="trait-value">${extraTrait.value}</span></span>` : ''}
                                    </div>
                                </div>
                                <div class="nft-actions">
                                    <button class="btn-number">#${number}</button>
                                    <button class="btn-auction" onclick="event.stopPropagation(); window.open('${auctionUrl}', '_blank')">
                                        <span class="icon">⚡</span> Аукцион
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            });

            grid.innerHTML = html;

            // ============================================================
            // 4. ЗАГРУЗКА LOTTIE АНИМАЦИЙ
            // ============================================================
            setTimeout(() => {
                Object.entries(grouped).forEach(([collectionName, items]) => {
                    items.forEach((nft, index) => {
                        const number = nft.name.match(/#(\d+)/)?.[1] || '0000';
                        const containerId = `lottie-${collectionName.replace(/\s/g, '')}-${number}-${index}`;
                        const container = document.getElementById(containerId);

                        if (container && nft.lottie) {
                            try {
                                const anim = lottie.loadAnimation({
                                    container: container,
                                    path: nft.lottie,
                                    renderer: 'svg',
                                    loop: true,
                                    autoplay: true
                                });

                                // Ставим фон для контейнера
                                const colors = getCollectionColors(collectionName);
                                container.style.background = colors.bg;

                                // Перезапускаем при фокусе (для Telegram WebView)
                                document.addEventListener('visibilitychange', () => {
                                    if (!document.hidden) {
                                        anim.play();
                                    }
                                });

                            } catch (e) {
                                console.warn('Lottie error:', e);
                                container.innerHTML = `<div style="color:#6e6e80; font-size:28px;">🎁</div>`;
                            }
                        }
                    });
                });
            }, 100);
        }

        // Запуск
        renderGrid();
    </script>

</body>
</html>
