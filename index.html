<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Allow Market</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .app {
            max-width: 430px;
            width: 100%;
            min-height: 100vh;
            background: #0a0a0f;
            padding-bottom: 20px;
            position: relative;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 16px 12px 16px;
            background: rgba(10, 10, 15, 0.8);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
        }
        .header h1 {
            font-size: 22px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.5px;
        }
        .header .profile {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .header .profile:active {
            opacity: 0.7;
        }
        .header .profile .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
            background: linear-gradient(135deg, #4a8af4, #6c5ce7);
        }
        .header .profile .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .header .profile .avatar .avatar-placeholder {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
        }
        .header .profile .username {
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .header .profile .username span {
            color: #8e8ea0;
            font-weight: 400;
        }
        .filter-section {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .filter-toggle-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 8px 16px;
            border-radius: 20px;
            color: #8e8ea0;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }
        .filter-toggle-btn .arrow {
            transition: transform 0.3s ease;
        }
        .filter-toggle-btn .arrow.open {
            transform: rotate(180deg);
        }
        .filter-dropdown {
            display: none;
            flex-wrap: wrap;
            gap: 6px;
            padding: 12px 0 4px 0;
            width: 100%;
            animation: slideDown 0.3s ease;
        }
        .filter-dropdown.open {
            display: flex;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .filter-option {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 4px 12px 4px 8px;
            border-radius: 16px;
            color: #8e8ea0;
            font-size: 11px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        .filter-option .mini-lottie {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            background: #121216;
        }
        .filter-option .mini-lottie .lottie-container {
            width: 100%;
            height: 100%;
        }
        .filter-option:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
        }
        .filter-option.active {
            background: rgba(74, 138, 244, 0.15);
            border-color: rgba(74, 138, 244, 0.2);
            color: #4a8af4;
        }
        .filter-option .emoji {
            font-size: 14px;
        }
        .nft-grid {
            padding: 12px 12px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .nft-card {
            background: #1a1a1f;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            position: relative;
        }
        .nft-card:active {
            transform: scale(0.97);
        }
        .nft-card-inner {
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 8px;
            background: #1a1a1f;
        }
        .lottie-wrapper {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 12px;
            overflow: hidden;
            background: #121216;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .lottie-wrapper .lottie-container {
            width: 100%;
            height: 100%;
        }
        .status-badge {
            position: absolute;
            top: 4px;
            right: 4px;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 7px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .status-badge.sold {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.2);
        }
        .status-badge.for-sale {
            background: rgba(75, 200, 138, 0.15);
            color: #4bc88a;
            border: 1px solid rgba(75, 200, 138, 0.15);
        }
        .status-badge.on-auction {
            background: rgba(255, 200, 50, 0.15);
            color: #ffc832;
            border: 1px solid rgba(255, 200, 50, 0.15);
        }
        .nft-info-compact {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .nft-name-compact {
            font-size: 12px;
            font-weight: 700;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .nft-model-compact {
            font-size: 10px;
            color: #8e8ea0;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .nft-price-compact {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            font-weight: 700;
            color: #ffffff;
            margin-top: 4px;
        }
        .gram-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }
        .gram-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .detail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            z-index: 500;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: fadeIn 0.25s ease;
        }
        .detail-overlay.open {
            display: flex;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .detail-content {
            background: #1a1a1f;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            max-height: 85vh;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            overflow-y: auto;
        }
        .detail-content::-webkit-scrollbar {
            width: 0;
        }
        .detail-close {
            position: sticky;
            float: right;
            top: 0;
            background: rgba(255, 255, 255, 0.04);
            border: none;
            color: #8e8ea0;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 10;
            margin-bottom: 8px;
        }
        .detail-close:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }
        .detail-layout {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .detail-lottie-wrapper {
            width: 100%;
            max-height: 200px;
            aspect-ratio: 1/1;
            border-radius: 14px;
            overflow: hidden;
            background: #121216;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .detail-lottie-wrapper .lottie-container {
            width: 100%;
            height: 100%;
        }
        .detail-title {
            font-size: 17px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 1px;
        }
        .detail-number {
            font-size: 14px;
            font-weight: 700;
            color: #4a8af4;
            margin-bottom: 6px;
        }
        .detail-description {
            font-size: 12px;
            color: #8e8ea0;
            line-height: 1.4;
            margin-bottom: 10px;
        }
        .detail-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 16px;
            margin-bottom: 10px;
        }
        .detail-stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .detail-stat.full-width {
            grid-column: 1 / -1;
        }
        .detail-stat .label {
            font-size: 11px;
            color: #6e6e80;
            font-weight: 500;
        }
        .detail-stat .value {
            font-size: 11px;
            color: #ffffff;
            font-weight: 600;
            text-align: right;
            max-width: 65%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .detail-price {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 10px;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .detail-price .gram-icon {
            width: 22px;
            height: 22px;
        }
        .detail-price .gram-icon img {
            width: 22px;
            height: 22px;
        }
        .detail-price .usd {
            font-size: 12px;
            font-weight: 400;
            color: #6e6e80;
        }
        .detail-buy-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #4a8af4, #6c5ce7);
            border: none;
            border-radius: 12px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .detail-buy-btn:active {
            transform: scale(0.97);
        }
        .detail-buy-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .detail-buy-btn.sold-out {
            background: rgba(255, 255, 255, 0.05);
            color: #6e6e80;
        }
        .detail-buy-btn.in-cart {
            background: rgba(75, 200, 138, 0.2);
            color: #4bc88a;
        }
        .cart-floating {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(145deg, #1a1a2e, #14141e);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 10px 20px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            z-index: 200;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .cart-floating:active {
            transform: translateX(-50%) scale(0.95);
        }
        .cart-floating .cart-icon {
            font-size: 18px;
            position: relative;
        }
        .cart-floating .cart-count {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #4a8af4;
            color: #ffffff;
            font-size: 9px;
            font-weight: 700;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cart-floating .cart-total {
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
        }
        .cart-floating .cart-total .ton {
            color: #6e6e80;
            font-weight: 400;
        }
        .cart-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            z-index: 300;
            display: none;
            justify-content: center;
            align-items: flex-end;
            animation: fadeUp 0.3s ease;
        }
        .cart-modal.open {
            display: flex;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .cart-modal-content {
            background: #14141e;
            border-radius: 24px 24px 0 0;
            max-width: 430px;
            width: 100%;
            max-height: 75vh;
            padding: 20px 16px 30px 16px;
            overflow-y: auto;
        }
        .cart-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        .cart-modal-header h2 {
            font-size: 20px;
            font-weight: 700;
        }
        .cart-close {
            background: rgba(255, 255, 255, 0.04);
            border: none;
            color: #8e8ea0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
        }
        .cart-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .cart-item .item-info {
            flex: 1;
        }
        .cart-item .item-name {
            font-size: 14px;
            font-weight: 600;
        }
        .cart-item .item-collection {
            font-size: 11px;
            color: #6e6e80;
        }
        .cart-item .item-price {
            font-size: 13px;
            color: #4a8af4;
            font-weight: 600;
        }
        .cart-item .item-remove {
            background: rgba(255, 107, 107, 0.1);
            border: none;
            color: #ff6b6b;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 14px;
            cursor: pointer;
        }
        .cart-total-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0 8px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            margin-top: 8px;
        }
        .cart-total-section .total-label {
            font-size: 16px;
            font-weight: 600;
            color: #8e8ea0;
        }
        .cart-total-section .total-amount {
            font-size: 20px;
            font-weight: 800;
            color: #ffffff;
        }
        .cart-total-section .total-amount .ton {
            color: #8e8ea0;
            font-weight: 400;
            font-size: 14px;
        }
        .btn-checkout {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4a8af4, #6c5ce7);
            border: none;
            border-radius: 16px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 12px;
        }
        .btn-checkout:active {
            transform: scale(0.97);
        }
        .btn-checkout:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .empty-cart {
            text-align: center;
            padding: 40px 20px;
            color: #6e6e80;
        }
        .empty-cart .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #6e6e80;
            font-size: 14px;
            grid-column: 1 / -1;
        }
        .loading .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid rgba(255, 255, 255, 0.04);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px auto;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        @media (min-width: 600px) {
            .detail-content {
                max-width: 480px;
                padding: 20px;
            }
            .detail-layout {
                flex-direction: row;
                align-items: flex-start;
            }
            .detail-lottie-wrapper {
                max-width: 200px;
                max-height: 200px;
                flex-shrink: 0;
            }
            .detail-stats {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <div class="header">
            <h1>Allow Market</h1>
            <div class="profile" id="profileBtn">
                <div class="avatar" id="avatarContainer">
                    <img id="avatarImg" style="display:none;" alt="avatar">
                    <div class="avatar-placeholder" id="avatarPlaceholder">👤</div>
                </div>
                <div class="username" id="usernameDisplay">Профиль <span>▼</span></div>
            </div>
        </div>

        <div class="filter-section">
            <button class="filter-toggle-btn" id="filterToggle">
                <span>🔍</span> Фильтр
                <span class="arrow" id="filterArrow">▼</span>
            </button>
            <div class="filter-dropdown" id="filterDropdown">
                <div class="filter-option active" data-collection="all">
                    <span class="emoji">📋</span> Все
                </div>
            </div>
        </div>

        <div class="nft-grid" id="nftGrid">
            <div class="loading">
                <div class="spinner"></div>
                Загрузка подарков...
            </div>
        </div>

        <div class="detail-overlay" id="detailOverlay">
            <div class="detail-content">
                <button class="detail-close" id="detailClose">✕</button>
                <div class="detail-layout">
                    <div class="detail-lottie-wrapper" id="detailLottieWrapper">
                        <div class="lottie-container" id="detailLottie"></div>
                    </div>
                    <div style="flex:1;min-width:0;">
                        <div class="detail-title" id="detailTitle">Collection</div>
                        <div class="detail-number" id="detailNumber">#0000</div>
                        <div class="detail-description" id="detailDescription">Description</div>
                        <div class="detail-stats" id="detailStats">
                            <div class="detail-stat full-width">
                                <span class="label">Owner</span>
                                <span class="value" id="detailOwner">—</span>
                            </div>
                            <div class="detail-stat">
                                <span class="label">Model</span>
                                <span class="value" id="detailModel">—</span>
                            </div>
                            <div class="detail-stat">
                                <span class="label">Backdrop</span>
                                <span class="value" id="detailBackdrop">—</span>
                            </div>
                            <div class="detail-stat">
                                <span class="label">Symbol</span>
                                <span class="value" id="detailSymbol">—</span>
                            </div>
                            <div class="detail-stat">
                                <span class="label">Issued</span>
                                <span class="value" id="detailIssued">—</span>
                            </div>
                            <div class="detail-stat">
                                <span class="label">Status</span>
                                <span class="value" id="detailStatus">—</span>
                            </div>
                        </div>
                        <div class="detail-price" id="detailPrice">
                            <span class="gram-icon">
                                <img src="https://www.mexc.co/api/file/download/F20260615184306269DUAXgshbJv0AGy" alt="GRAM">
                            </span>
                            <span id="detailPriceAmount">0.00 GRAM</span>
                            <span class="usd" id="detailPriceUsd">≈ $0.00</span>
                        </div>
                        <button class="detail-buy-btn" id="detailBuyBtn">💎 Купить</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="cart-floating" id="cartFloating">
            <div class="cart-icon">
                🛒
                <span class="cart-count" id="cartCount">0</span>
            </div>
            <div class="cart-total">
                <span id="cartTotal">0.00</span> <span class="ton">GRAM</span>
            </div>
        </div>

        <div class="cart-modal" id="cartModal">
            <div class="cart-modal-content">
                <div class="cart-modal-header">
                    <h2>🛒 Корзина</h2>
                    <button class="cart-close" id="cartClose">✕</button>
                </div>
                <div id="cartItems"></div>
                <div class="cart-total-section">
                    <span class="total-label">Итого</span>
                    <span class="total-amount"><span id="modalCartTotal">0.00</span> <span class="ton">GRAM</span></span>
                </div>
                <button class="btn-checkout" id="checkoutBtn">Купить все</button>
            </div>
        </div>
    </div>

        function saveCart() {
            localStorage.setItem('nft_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function addToCart(nftName) {
            const index = cart.indexOf(nftName);
            if (index > -1) {
                cart.splice(index, 1);
            } else {
                cart.push(nftName);
            }
            saveCart();
            renderGrid();
            updateDetailButtons();
            updateFilterMiniLottie();
        }

        function removeFromCart(nftName) {
            cart = cart.filter(item => item !== nftName);
            saveCart();
            renderCartItems();
            updateCartUI();
            updateDetailButtons();
            updateFilterMiniLottie();
        }

        function getCartTotal() {
            return cart.reduce((sum, name) => {
                const nft = NFT_DATA.find(n => n.name === name);
                return sum + (nft ? nft.price : 0);
            }, 0);
        }

        function isInCart(nftName) {
            return cart.includes(nftName);
        }

        function updateCartUI() {
            const count = cart.length;
            const total = getCartTotal();

            document.getElementById('cartCount').textContent = count;
            document.getElementById('cartTotal').textContent = total.toFixed(2);
            document.getElementById('modalCartTotal').textContent = total.toFixed(2);
            document.getElementById('checkoutBtn').disabled = count === 0;
            renderCartItems();
        }

        function renderCartItems() {
            const container = document.getElementById('cartItems');
            if (cart.length === 0) {
                container.innerHTML = `
                        <div class="empty-cart">
                            <div class="icon">🛒</div>
                            <p>Корзина пуста</p>
                            <p style="font-size:13px; margin-top:4px; color:#6e6e80;">Добавьте NFT для покупки</p>
                        </div>
                    `;
                return;
            }

            let html = '';
            cart.forEach(name => {
                const nft = NFT_DATA.find(n => n.name === name);
                if (!nft) return;
                html += `
                        <div class="cart-item">
                            <div style="width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:18px;">

                            <div class="item-info">
                                <div class="item-name">${nft.name}</div>
                                <div class="item-collection">${nft.collection}</div>
                            </div>
                            <div class="item-price">${nft.price.toFixed(3)} GRAM</div>
                            <button class="item-remove" onclick="removeFromCart('${nft.name}')">✕</button>
                        </div>
                    `;
            });
            container.innerHTML = html;
        }

        function updateDetailButtons() {
            const nft = window._currentDetailNft;
            if (!nft) return;
            const btn = document.getElementById('detailBuyBtn');
            const inCart = isInCart(nft.name);
            if (nft.status === 'sold' || nft.price === 0) {
                btn.textContent = '🔴 Продано';
                btn.className = 'detail-buy-btn sold-out';
                btn.disabled = true;
            } else if (inCart) {
                btn.textContent = '✓ В корзине';
                btn.className = 'detail-buy-btn in-cart';
                btn.disabled = false;
                btn.onclick = () => { addToCart(nft.name);
                    updateDetailButtons(); };
            } else {
                btn.textContent = '💎 Купить';
                btn.className = 'detail-buy-btn';
                btn.disabled = false;
                btn.onclick = () => { addToCart(nft.name);
                    updateDetailButtons(); };
            }
        }

        function initProfile() {
            const avatarImg = document.getElementById('avatarImg');
            const avatarPlaceholder = document.getElementById('avatarPlaceholder');
            const usernameDisplay = document.getElementById('usernameDisplay');

            // Проверяем наличие Telegram WebApp
            if (window.Telegram && window.Telegram.WebApp) {
                const user = window.Telegram.WebApp.initDataUnsafe?.user;
                if (user) {
                    // Устанавливаем аватарку
                    if (user.photo_url) {
                        avatarImg.src = user.photo_url;
                        avatarImg.style.display = 'block';
                        avatarPlaceholder.style.display = 'none';
                    } else {
                        // Если фото нет, показываем инициалы
                        const initials = user.first_name?.charAt(0).toUpperCase() || '👤';
                        avatarPlaceholder.textContent = initials;
                        avatarPlaceholder.style.display = 'flex';
                        avatarImg.style.display = 'none';
                    }
                    // Устанавливаем имя
                    usernameDisplay.innerHTML = `${user.first_name || 'Пользователь'} <span>▼</span>`;
                } else {
                    // Если пользователь не найден
                    avatarPlaceholder.textContent = '👤';
                    avatarPlaceholder.style.display = 'flex';
                    avatarImg.style.display = 'none';
                    usernameDisplay.innerHTML = `Профиль <span>▼</span>`;
                }
            } else {
                // Если не в Telegram WebApp — показываем заглушку
                avatarPlaceholder.textContent = '👤';
                avatarPlaceholder.style.display = 'flex';
                avatarImg.style.display = 'none';
                usernameDisplay.innerHTML = `Профиль <span>▼</span>`;
            }

            // Клик по профилю — открываем профиль Telegram
            document.getElementById('profileBtn').addEventListener('click', () => {
                if (window.Telegram && window.Telegram.WebApp) {
                    window.Telegram.WebApp.openLink('https://t.me/me');
                } else {
                    alert('👤 Профиль пользователя\n\nЗдесь будет ваша аватарка и имя из Telegram.\nОткройте приложение через Telegram WebApp.');

            });
        }

        const lottieCache = new Map();

        function loadLottie(container, url, isMini = false) {
            if (lottieCache.has(url)) {
                const cached = lottieCache.get(url);
                container.innerHTML = '';
                lottie.loadAnimation({
                    container: container,
                    animationData: cached,
                    renderer: 'svg',
                    loop: true,
                    autoplay: true
                });
                if (!isMini) container.style.background = '#121216';
                return;
            }

            try {
                fetch(url)
                    .then(res => {
                        if (!res.ok) throw new Error('Network error');
                        return res.json();
                    })
                    .then(data => {
                        lottieCache.set(url, data);
                        lottie.loadAnimation({
                            container: container,
                            animationData: data,
                            renderer: 'svg',
                            loop: true,
                            autoplay: true
                        });
                        if (!isMini) container.style.background = '#121216';
                    })
                    .catch(() => {
                        container.innerHTML =
                            `<div style="color:#6e6e80;font-size:${isMini ? '14px' : '28px'};">${isMini ? '🎁' : '🎁'}</div>`;
                    });
            } catch (e) {
                container.innerHTML =
                    `<div style="color:#6e6e80;font-size:${isMini ? '14px' : '28px'};">${isMini ? '🎁' : '🎁'}</div>`;
            }
        }

        function renderGrid() {
            const filtered = currentFilter === 'all' ?
                NFT_DATA :
                NFT_DATA.filter(item => item.collection === currentFilter);

            if (filtered.length === 0) {
                grid.innerHTML =
                    `<div class="loading" style="grid-column:1/-1;padding:40px 20px;color:#6e6e80;">Нет подарков в этой коллекции</div>`;
                return;
            }

            let html = '';

            filtered.forEach((nft) => {
                const number = nft.number || nft.name.match(/#(\d+)/)?.[1] || '0000';
                const model = nft.attributes.find(a => a.trait_type === 'Model')?.value || '';

                const lottieId = `lottie-${nft.collection.replace(/\s/g, '')}-${number}`;

                const statusEmoji = {
                    'sold': '🔴',
                    'for-sale': '🟢',
                    'on-auction': '🟡'
                } [nft.status] || '⚪';

                const statusLabel = {
                    'sold': 'Продано',
                    'for-sale': 'В продаже',
                    'on-auction': 'На аукционе'
                } [nft.status] || '';

                const statusClass = {
                    'sold': 'sold',
                    'for-sale': 'for-sale',
                    'on-auction': 'on-auction'
                } [nft.status] || '';

                html += `
                        <div class="nft-card" onclick="openDetail('${nft.name}')">
                            <div class="nft-card-inner">
                                <div class="lottie-wrapper">
                                    <div class="lottie-container" id="${lottieId}"></div>
                                    ${nft.status !== 'for-sale' ? `<div class="status-badge ${statusClass}">${statusEmoji} ${statusLabel}</div>` : ''}
                                </div>
                                <div class="nft-info-compact">
                                    <div class="nft-name-compact">${nft.name}</div>
                                    <div class="nft-model-compact">${model}</div>
                                    <div class="nft-price-compact">
                                        <span class="gram-icon">
                                            <img src="https://www.mexc.co/api/file/download/F20260615184306269DUAXgshbJv0AGy" alt="GRAM">
                                        </span>
                                        ${nft.price > 0 ? `${nft.price.toFixed(1)}` : '—'}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
            });

            grid.innerHTML = html;

            setTimeout(() => {
                filtered.forEach((nft) => {
                    const number = nft.number || nft.name.match(/#(\d+)/)?.[1] || '0000';
                    const containerId = `lottie-${nft.collection.replace(/\s/g, '')}-${number}`;
                    const container = document.getElementById(containerId);

                    if (container && nft.lottie) {
                        loadLottie(container, nft.lottie);
                    }
                });
                updateCartUI();
                updateFilterMiniLottie();
            }, 150);
        }

        function updateFilterMiniLottie() {
            Object.keys(COLLECTIONS_DATA).forEach(collection => {
                const miniId = `mini-${collection.replace(/\s/g, '')}`;
                const container = document.querySelector(`#${miniId} .lottie-container`);
                if (!container) return;

                const nft = NFT_DATA.find(n => n.collection === collection);
                if (nft && nft.lottie) {
                    loadLottie(container, nft.lottie, true);
                }
            });
        }

        // ============================================================
        // 6. ДЕТАЛЬНЫЙ ПРОСМОТР
        // ============================================================
        const detailOverlay = document.getElementById('detailOverlay');

        function openDetail(name) {
            const nft = NFT_DATA.find(n => n.name === name);
            if (!nft) return;

            window._currentDetailNft = nft;

            const number = nft.number || nft.name.match(/#(\d+)/)?.[1] || '0000';
            const model = nft.attributes.find(a => a.trait_type === 'Model')?.value || '';
            const backdrop = nft.attributes.find(a => a.trait_type === 'Backdrop')?.value || '';
            const symbol = nft.attributes.find(a => a.trait_type === 'Symbol')?.value || '';

            document.getElementById('detailTitle').textContent = nft.collection;
            document.getElementById('detailNumber').textContent = `#${number}`;
            document.getElementById('detailDescription').textContent = nft.description || 'Unique NFT gift from Telegram';

            document.getElementById('detailOwner').textContent = nft.owner || '—';
            document.getElementById('detailModel').textContent = model || '—';
            document.getElementById('detailBackdrop').textContent = backdrop || '—';
            document.getElementById('detailSymbol').textContent = symbol || '—';
            document.getElementById('detailIssued').textContent = nft.issued || `${number} of 1973`;

            const statusMap = {
                'for-sale': '🟢 В продаже',
                'on-auction': '🟡 На аукционе',
                'sold': '🔴 Продано'
            };
            document.getElementById('detailStatus').textContent = statusMap[nft.status] || nft.status;

            if (nft.price > 0) {
                document.getElementById('detailPriceAmount').textContent = `${nft.price.toFixed(3)} GRAM`;
                document.getElementById('detailPriceUsd').textContent = `≈ $${(nft.price * 5.2).toFixed(2)}`;
                document.getElementById('detailPrice').style.display = 'flex';
            } else {
                document.getElementById('detailPrice').style.display = 'none';
            }

            const detailContainer = document.getElementById('detailLottie');
            detailContainer.innerHTML = '';

            if (lottieCache.has(nft.lottie)) {
                const cached = lottieCache.get(nft.lottie);
                lottie.loadAnimation({
                    container: detailContainer,
                    animationData: cached,
                    renderer: 'svg',
                    loop: true,
                    autoplay: true
                });
                document.getElementById('detailLottieWrapper').style.background = '#121216';
            } else {
                try {
                    fetch(nft.lottie)
                        .then(res => {
                            if (!res.ok) throw new Error('Network error');
                            return res.json();
                        })
                        .then(data => {
                            lottieCache.set(nft.lottie, data);
                            lottie.loadAnimation({
                                container: detailContainer,
                                animationData: data,
                                renderer: 'svg',
                                loop: true,
                                autoplay: true
                            });
                            document.getElementById('detailLottieWrapper').style.background = '#121216';
                        })
                        .catch(() => {
                            detailContainer.innerHTML =
                                `<div style="color:#6e6e80;font-size:48px;display:flex;align-items:center;justify-content:center;height:100%;">${COLLECTIONS_DATA[nft.collection]?.icon || '🎁'}</div>`;
                        });
                } catch (e) {
                    detailContainer.innerHTML =
                        `<div style="color:#6e6e80;font-size:48px;display:flex;align-items:center;justify-content:center;height:100%;">${COLLECTIONS_DATA[nft.collection]?.icon || '🎁'}</div>`;
                }
            }

            updateDetailButtons();

            detailOverlay.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeDetail() {
            detailOverlay.classList.remove('open');
            document.body.style.overflow = '';
            const container = document.getElementById('detailLottie');
            container.innerHTML = '';
            window._currentDetailNft = null;
        }

        document.getElementById('detailClose').addEventListener('click', closeDetail);
        detailOverlay.addEventListener('click', (e) => {
            if (e.target === detailOverlay) closeDetail();
        });

        // ============================================================
        // 7. КОРЗИНА
        // ============================================================
        const cartModal = document.getElementById('cartModal');

        document.getElementById('cartFloating').addEventListener('click', () => {
            cartModal.classList.toggle('open');
            renderCartItems();
            updateCartUI();
        });

        document.getElementById('cartClose').addEventListener('click', () => {
            cartModal.classList.remove('open');
        });

        cartModal.addEventListener('click', (e) => {
            if (e.target === cartModal) cartModal.classList.remove('open');
        });

        document.getElementById('checkoutBtn').addEventListener('click', () => {
            if (cart.length === 0) return;
            const total = getCartTotal();
            if (confirm(`💎 Подтвердите покупку ${cart.length} NFT на сумму ${total.toFixed(3)} GRAM`)) {
                alert(`✅ Покупка оформлена!\nКуплено: ${cart.length} NFT\nСумма: ${total.toFixed(3)} GRAM`);
                cart = [];
                saveCart();
                cartModal.classList.remove('open');
                closeDetail();
                renderGrid();
            }
        });

        // ============================================================
        // 8. ЗАПУСК
        // ============================================================
        // Инициализируем профиль после загрузки страницы
        document.addEventListener('DOMContentLoaded', () => {
            initProfile();
        });

        renderGrid();
        updateCartUI();

        document.addEventListener('click', (e) => {
            const filterSection = document.querySelector('.filter-section');
            if (filterSection && !filterSection.contains(e.target)) {
                document.getElementById('filterDropdown').classList.remove('open');
                document.getElementById('filterArrow').classList.remove('open');
            }
        });
    </script>

</body>
</html>
