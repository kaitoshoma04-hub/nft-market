<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NFT Подарки</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .app {
            max-width: 430px;
            width: 100%;
            min-height: 100vh;
            background: #0a0a0f;
            position: relative;
            padding-bottom: 80px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 16px 12px 16px;
            background: #0a0a0f;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .header h1 {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #8e8ea0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .header-btn {
            background: rgba(255, 255, 255, 0.04);
            border: none;
            color: #8e8ea0;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .header-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        .header-btn .badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background: #ff6b6b;
            color: #ffffff;
            font-size: 10px;
            font-weight: 700;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .filters {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 12px 16px;
            scrollbar-width: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .filters::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 6px 16px;
            border-radius: 20px;
            color: #8e8ea0;
            font-size: 13px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-btn.active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }

        .filter-btn:active {
            transform: scale(0.95);
        }

        .nft-grid {
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .collection-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0 4px 0;
        }

        .collection-name {
            font-size: 17px;
            font-weight: 700;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .collection-name .icon {
            font-size: 20px;
        }

        .collection-count {
            font-size: 13px;
            color: #6e6e80;
            font-weight: 500;
        }

        .nft-card {
            background: linear-gradient(145deg, #14141e 0%, #1a1a2e 100%);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            transition: all 0.25s ease;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .nft-card:active {
            transform: scale(0.98);
        }

        .nft-card-inner {
            display: flex;
            gap: 14px;
            padding: 12px;
            align-items: center;
        }

        .lottie-wrapper {
            width: 80px;
            height: 80px;
            flex-shrink: 0;
            border-radius: 14px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .lottie-wrapper .lottie-container {
            width: 100%;
            height: 100%;
        }

        .status-badge {
            position: absolute;
            top: 4px;
            right: 4px;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-badge.sold {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.2);
        }

        .status-badge['for-sale'] {
            background: rgba(75, 200, 138, 0.2);
            color: #4bc88a;
            border: 1px solid rgba(75, 200, 138, 0.2);
        }

        .status-badge['on-auction'] {
            background: rgba(255, 200, 50, 0.2);
            color: #ffc832;
            border: 1px solid rgba(255, 200, 50, 0.2);
        }

        .nft-info {
            flex: 1;
            min-width: 0;
        }

        .nft-name {
            font-size: 14px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 1px;
            letter-spacing: -0.2px;
        }

        .nft-model {
            font-size: 12px;
            color: #8e8ea0;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .nft-traits {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 6px;
        }

        .trait-tag {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 1px 8px;
            border-radius: 10px;
            font-size: 9px;
            font-weight: 600;
            color: #6e6e80;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .trait-tag .trait-value {
            color: #a0a0b0;
        }

        .nft-price {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 700;
            color: #ffffff;
        }

        .nft-price .ton-icon {
            font-size: 14px;
        }

        .nft-price .usd {
            font-size: 11px;
            font-weight: 400;
            color: #6e6e80;
        }

        .nft-actions {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 5px 12px;
            border-radius: 12px;
            color: #ffffff;
            font-size: 11px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-action:active {
            transform: scale(0.92);
        }

        .btn-action.primary {
            background: rgba(75, 200, 138, 0.15);
            border-color: rgba(75, 200, 138, 0.2);
            color: #4bc88a;
        }

        .btn-action.primary:hover {
            background: rgba(75, 200, 138, 0.25);
        }

        .btn-action.danger {
            background: rgba(255, 107, 107, 0.1);
            border-color: rgba(255, 107, 107, 0.1);
            color: #ff6b6b;
        }

        .btn-action .icon {
            font-size: 12px;
        }

        .btn-number {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 5px 10px;
            border-radius: 12px;
            color: #6e6e80;
            font-size: 11px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }

        .cart-floating {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(145deg, #1a1a2e, #14141e);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 12px 24px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            z-index: 200;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cart-floating:active {
            transform: translateX(-50%) scale(0.95);
        }

        .cart-floating .cart-icon {
            font-size: 20px;
            position: relative;
        }

        .cart-floating .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #4bc88a;
            color: #0a0a0f;
            font-size: 10px;
            font-weight: 700;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-floating .cart-total {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
        }

        .cart-floating .cart-total .ton {
            color: #8e8ea0;
            font-weight: 400;
        }

        .cart-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            z-index: 300;
            display: none;
            justify-content: center;
            align-items: flex-end;
            animation: fadeUp 0.3s ease;
        }

        .cart-modal.open {
            display: flex;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .cart-modal-content {
            background: #14141e;
            border-radius: 24px 24px 0 0;
            max-width: 430px;
            width: 100%;
            max-height: 80vh;
            padding: 20px 16px 30px 16px;
            overflow-y: auto;
        }

        .cart-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .cart-modal-header h2 {
            font-size: 20px;
            font-weight: 700;
        }

        .cart-close {
            background: rgba(255, 255, 255, 0.04);
            border: none;
            color: #8e8ea0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .cart-close:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .cart-item .item-info {
            flex: 1;
        }

        .cart-item .item-name {
            font-size: 14px;
            font-weight: 600;
        }

        .cart-item .item-price {
            font-size: 13px;
            color: #4bc88a;
            font-weight: 600;
        }

        .cart-item .item-remove {
            background: rgba(255, 107, 107, 0.1);
            border: none;
            color: #ff6b6b;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .cart-item .item-remove:hover {
            background: rgba(255, 107, 107, 0.2);
        }

        .cart-total-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0 8px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            margin-top: 8px;
        }

        .cart-total-section .total-label {
            font-size: 16px;
            font-weight: 600;
            color: #8e8ea0;
        }

        .cart-total-section .total-amount {
            font-size: 20px;
            font-weight: 800;
            color: #ffffff;
        }

        .cart-total-section .total-amount .ton {
            color: #8e8ea0;
            font-weight: 400;
            font-size: 14px;
        }

        .btn-checkout {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4bc88a, #2ea86a);
            border: none;
            border-radius: 16px;
            color: #0a0a0f;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 12px;
        }

        .btn-checkout:active {
            transform: scale(0.97);
        }

        .btn-checkout:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .empty-cart {
            text-align: center;
            padding: 40px 20px;
            color: #6e6e80;
        }

        .empty-cart .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #6e6e80;
            font-size: 14px;
        }

        .loading .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid rgba(255, 255, 255, 0.04);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 420px) {
            .nft-card-inner {
                flex-wrap: wrap;
            }

            .lottie-wrapper {
                width: 64px;
                height: 64px;
            }

            .nft-actions {
                width: 100%;
                justify-content: flex-end;
                margin-top: 2px;
            }

            .cart-floating {
                padding: 10px 16px;
                bottom: 12px;
            }

            .cart-floating .cart-total {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <div class="header">
            <h1>🎁 Подарки</h1>
            <div class="header-actions">

            </div>
        </div>

        <div class="filters" id="filtersContainer">
            <button class="filter-btn active" data-collection="all">Все</button>
        </div>

        <div class="nft-grid" id="nftGrid">
            <div class="loading">

        <div class="cart-floating" id="cartFloating">
            <div class="cart-icon">

            </div>
            <div class="cart-total">

        </div>

        <div class="cart-modal" id="cartModal">

                    <h2>🛒 Корзина</h2>

                <button class="btn-checkout" id="checkoutBtn">💎 Купить все</button>

        // ============================================================
        // 3. КОРЗИНА
        // ============================================================
        let cart = JSON.parse(localStorage.getItem('nft_cart') || '[]');

        function saveCart() {
            localStorage.setItem('nft_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function addToCart(nftName, price) {
            if (cart.includes(nftName)) {
                cart = cart.filter(item => item !== nftName);
            } else {
                cart.push(nftName);
            }
            saveCart();
        }

        function removeFromCart(nftName) {
            cart = cart.filter(item => item !== nftName);
            saveCart();
        }

        function getCartTotal() {
            return cart.reduce((sum, name) => {
                const nft = NFT_DATA.find(n => n.name === name);
                return sum + (nft ? nft.price : 0);
            }, 0);
        }

        function isInCart(nftName) {
            return cart.includes(nftName);
        }

        function updateCartUI() {
            const count = cart.length;
            const total = getCartTotal();

            document.getElementById('cartCount').textContent = count;
            document.getElementById('cartTotal').textContent = total.toFixed(2);
            document.getElementById('modalCartTotal').textContent = total.toFixed(2);

            document.querySelectorAll('.btn-action[data-action="cart"]').forEach(btn => {
                const name = btn.dataset.nft;
                if (isInCart(name)) {
                    btn.textContent = '✓ В корзине';
                    btn.classList.add('primary');
                } else {
                    btn.textContent = '🛒 В корзину';
                    btn.classList.remove('primary');
                }
            });

            document.getElementById('checkoutBtn').disabled = count === 0;
            renderCartItems();
        }

        function renderCartItems() {
            const container = document.getElementById('cartItems');
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <div class="icon">🛒</div>
                        <p>Корзина пуста</p>
                        <p style="font-size:13px; margin-top:4px;">Добавьте NFT для покупки</p>
                    </div>
                `;
                return;
            }

            let html = '';
            cart.forEach(name => {
                const nft = NFT_DATA.find(n => n.name === name);
                if (!nft) return;
                const number = nft.name.match(/#(\d+)/)?.[1] || '0000';
                html += `
                    <div class="cart-item">
                        <div style="width:40px;height:40px;border-radius:8px;background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:20px;">
                            ${COLLECTIONS_DATA[nft.collection]?.icon || '🎁'}
                        </div>
                        <div class="item-info">
                            <div class="item-name">${nft.name}</div>
                            <div style="font-size:11px;color:#6e6e80;">${nft.collection}</div>
                        </div>
                        <div class="item-price">${nft.price.toFixed(2)} TON</div>
                        <button class="item-remove" onclick="removeFromCart('${nft.name}')">✕</button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // ============================================================
        // 4. ГЕНЕРАЦИЯ ЦВЕТОВ
        // ============================================================
        function getCollectionColors(collectionName) {
            const hash = collectionName.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
            const hue1 = (hash * 137.5) % 360;
            const hue2 = (hue1 + 40) % 360;
            const sat = 55 + (hash % 20);
            const lig = 20 + (hash % 15);
            return {
                bg: `hsl(${hue1}, ${sat}%, ${lig}%)`,
                bgGradient: `linear-gradient(145deg, hsl(${hue1}, ${sat}%, ${lig-5}%), hsl(${hue2}, ${sat-10}%, ${lig+5}%))`,
                accent: `hsl(${hue1}, ${sat+20}%, ${lig+25}%)`,
                glow: `hsl(${hue1}, ${sat}%, ${lig+10}%)`
            };
        }

        // ============================================================
        // 5. РЕНДЕРИНГ
        // ============================================================
        let currentFilter = 'all';
        const grid = document.getElementById('nftGrid');
        const filtersContainer = document.getElementById('filtersContainer');

        const collections = ['all', ...new Set(NFT_DATA.map(item => item.collection))];

        collections.forEach(col => {
            const btn = document.createElement('button');
            btn.className = `filter-btn${col === 'all' ? ' active' : ''}`;
            btn.dataset.collection = col;
            const icon = col === 'all' ? '📋' : COLLECTIONS_DATA[col]?.icon || '🎁';
            btn.textContent = col === 'all' ? 'Все' : `${icon} ${col}`;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = col;
                renderGrid();
            });
            filtersContainer.appendChild(btn);
        });

        function renderGrid() {
            const filtered = currentFilter === 'all' ?
                NFT_DATA :
                NFT_DATA.filter(item => item.collection === currentFilter);

            if (filtered.length === 0) {
                grid.innerHTML =
                    `<div class="loading" style="padding:40px 20px; color:#6e6e80;">Нет подарков в этой коллекции</div>`;
                return;
            }

            const grouped = filtered.reduce((acc, item) => {
                if (!acc[item.collection]) acc[item.collection] = [];
                acc[item.collection].push(item);
                return acc;
            }, {});

            let html = '';

            Object.entries(grouped).forEach(([collectionName, items]) => {
                const colors = getCollectionColors(collectionName);
                const colData = COLLECTIONS_DATA[collectionName];

                html += `
                    <div class="collection-header">
                        <span class="collection-name">
                            <span class="icon">${colData?.icon || '🎁'}</span>
                            ${collectionName}
                        </span>
                        <span class="collection-count">${items.length} шт.</span>
                    </div>
                `;

                items.forEach((nft, index) => {
                    const number = nft.name.match(/#(\d+)/)?.[1] || '0000';
                    const model = nft.attributes.find(a => a.trait_type === 'Model')?.value || '';
                    const extraTraits = nft.attributes.filter(a => a.trait_type !== 'Model');

                    const lottieId = `lottie-${collectionName.replace(/\s/g, '')}-${number}-${index}`;
                    const statusEmoji = {
                        'sold': '🔴',
                        'for-sale': '🟢',
                        'on-auction': '🟡'
                    } [nft.status] || '⚪';

                    const statusLabel = {
                        'sold': 'Продано',
                        'for-sale': 'В продаже',
                        'on-auction': 'На аукционе'
                    } [nft.status] || '';

                    const statusClass = {
                        'sold': 'sold',
                        'for-sale': 'for-sale',
                        'on-auction': 'on-auction'
                    } [nft.status] || '';

                    const isInCartState = isInCart(nft.name);

                    html += `
                        <div class="nft-card" onclick="window.open('https://fragment.com/gift/${nft.name.toLowerCase().replace(/\s/g, '-').replace(/#/g, '')}', '_blank')">
                            <div class="nft-card-inner" style="background: ${colors.bgGradient}; border: 1px solid rgba(255,255,255,0.04);">
                                <div class="lottie-wrapper" style="background: ${colors.bg};">
                                    <div class="lottie-container" id="${lottieId}"></div>
                                    ${nft.status !== 'for-sale' ? `<div class="status-badge ${statusClass}">${statusEmoji} ${statusLabel}</div>` : ''}
                                </div>
                                <div class="nft-info">
                                    <div class="nft-name">${nft.name}</div>
                                    ${model ? `<div class="nft-model">${model}</div>` : ''}
                                    <div class="nft-traits">
                                        ${extraTraits.slice(0, 2).map(t => 
                                            `<span class="trait-tag">✦ <span class="trait-value">${t.value}</span></span>`
                                        ).join('')}
                                    </div>
                                    ${nft.price > 0 ? `
                                        <div class="nft-price">
                                            <span class="ton-icon">₿</span>
                                            ${nft.price.toFixed(2)} TON
                                            <span class="usd">≈ $${(nft.price * 5.2).toFixed(2)}</span>
                                        </div>
                                    ` : `
                                        <div style="font-size:12px;color:#6e6e80;">Не в продаже</div>
                                    `}
                                </div>
                                <div class="nft-actions">
                                    <button class="btn-number">#${number}</button>
                                    ${nft.price > 0 && nft.status !== 'sold' ? `
                                        <button class="btn-action ${isInCartState ? 'primary' : ''}" 
                                                data-action="cart" 
                                                data-nft="${nft.name}"
                                                onclick="event.stopPropagation(); addToCart('${nft.name}', ${nft.price});">
                                            ${isInCartState ? '✓ В корзине' : '🛒 В корзину'}
                                        </button>
                                    ` : ''}
                                    ${nft.status === 'sold' ? `
                                        <button class="btn-action danger" disabled>🔴 Продано</button>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                });
            });

            grid.innerHTML = html;

            setTimeout(() => {
                Object.entries(grouped).forEach(([collectionName, items]) => {
                    items.forEach((nft, index) => {
                        const number = nft.name.match(/#(\d+)/)?.[1] || '0000';
                        const containerId =
                            `lottie-${collectionName.replace(/\s/g, '')}-${number}-${index}`;
                        const container = document.getElementById(containerId);

                        if (container && nft.lottie) {
                            try {
                                const anim = lottie.loadAnimation({
                                    container: container,
                                    path: nft.lottie,
                                    renderer: 'svg',
                                    loop: true,
                                    autoplay: true
                                });

                                const colors = getCollectionColors(collectionName);
                                container.style.background = colors.bg;

                                document.addEventListener('visibilitychange', () => {
                                    if (!document.hidden) {
                                        anim.play();
                                    }
                                });

                            } catch (e) {
                                console.warn('Lottie error:', e);
                                container.innerHTML =
                                    `<div style="color:#6e6e80; font-size:28px;">${COLLECTIONS_DATA[collectionName]?.icon || '🎁'}</div>`;
                            }
                        }
                    });
                });
                updateCartUI();
            }, 150);
        }

        // ============================================================
        // 6. КОРЗИНА - ОТКРЫТИЕ/ЗАКРЫТИЕ
        // ============================================================
        const cartModal = document.getElementById('cartModal');

        document.getElementById('cartFloating').addEventListener('click', () => {
            cartModal.classList.toggle('open');
            renderCartItems();
            updateCartUI();
        });

        document.getElementById('cartClose').addEventListener('click', () => {
            cartModal.classList.remove('open');
        });

        cartModal.addEventListener('click', (e) => {
            if (e.target === cartModal) cartModal.classList.remove('open');
        });

        document.getElementById('checkoutBtn').addEventListener('click', () => {
            if (cart.length === 0) return;
            const total = getCartTotal();
            if (confirm(`💎 Подтвердите покупку ${cart.length} NFT на сумму ${total.toFixed(2)} TON`)) {
                alert(`✅ Покупка оформлена!\nКуплено: ${cart.length} NFT\nСумма: ${total.toFixed(2)} TON`);
                cart = [];
                saveCart();
                cartModal.classList.remove('open');
                renderGrid();
            }
        });

        // ============================================================
        // 7. ОБНОВЛЕНИЕ
        // ============================================================
        document.getElementById('refreshBtn').addEventListener('click', () => {
            renderGrid();
            document.getElementById('refreshBtn').style.transform = 'rotate(360deg)';
            setTimeout(() => {
                document.getElementById('refreshBtn').style.transform = 'rotate(0deg)';
            }, 300);
        });

        // ============================================================
        // 8. ЗАПУСК
        // ============================================================
        renderGrid();
        updateCartUI();
    </script>

</body>
</html>
